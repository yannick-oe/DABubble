<section class="auth-card auth-card--wide reset-card">
  <header class="auth-card__head">
    <button class="btn btn-icon" type="button" aria-label="Zurück" (click)="goBack()">
      <img src="/icons/arrow-left.svg" alt="" aria-hidden="true" />
    </button>
    <h1 #title class="reset-card__title" tabindex="-1">Passwort zurücksetzen</h1>
  </header>

  @switch (codeState()) {
    @case ('valid') {
      <form class="reset-card__form" [formGroup]="form" (ngSubmit)="submit()">
        <div class="form-field">
          <label class="sr-only" for="reset-password">Neues Passwort</label>
          <app-password-input
            inputId="reset-password"
            formControlName="password"
            placeholder="Neues Passwort"
            autocomplete="new-password"
            describedBy="reset-password-error"
            [invalid]="isPasswordInvalid()"
          />
          <p class="form-error" id="reset-password-error">{{ passwordError() }}</p>
        </div>

        <div class="form-field">
          <label class="sr-only" for="reset-confirm">Neues Kennwort bestätigen</label>
          <app-password-input
            inputId="reset-confirm"
            formControlName="confirm"
            placeholder="Neues Kennwort bestätigen"
            autocomplete="new-password"
            describedBy="reset-confirm-error"
            [invalid]="isConfirmInvalid()"
          />
          <p class="form-error" id="reset-confirm-error">{{ confirmError() }}</p>
        </div>

        <div class="reset-card__actions">
          <p class="form-error" role="alert">{{ generalError() }}</p>
          <button class="btn btn-primary" type="submit" [disabled]="form.invalid || pending()">
            Passwort ändern
          </button>
        </div>
      </form>
    }
    @case ('invalid') {
      <div class="reset-card__invalid">
        <p>Dieser Link ist abgelaufen oder ungültig.</p>
        <a routerLink="/auth/forgot-password">Neue E-Mail anfordern</a>
      </div>
    }
    @case ('checking') {
      <p class="reset-card__checking">Link wird geprüft …</p>
    }
  }
</section>
