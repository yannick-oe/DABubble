<nav class="workspace" aria-label="Workspace">
  <header class="workspace__head">
    <img class="workspace__head-logo" src="/logos/workspace-logo.svg" alt="" aria-hidden="true" />
    <h2 class="workspace__title">Devspace</h2>
    <a class="btn btn-icon btn-sm" routerLink="/app/new-message" aria-label="Neue Nachricht">
      <img src="/icons/edit-square.svg" alt="" aria-hidden="true" />
    </a>
  </header>

  <section class="workspace__section">
    <div class="workspace__section-head">
      <button
        class="workspace__section-toggle"
        type="button"
        aria-controls="workspace-channels"
        [attr.aria-expanded]="channelsOpen()"
        (click)="toggleChannels()"
      >
        <img
          class="workspace__caret"
          [class.workspace__caret--closed]="!channelsOpen()"
          src="/icons/arrow-drop-down.svg"
          alt=""
          aria-hidden="true"
        />
        <img class="workspace__section-icon" src="/icons/workspaces.svg" alt="" aria-hidden="true" />
        <span class="workspace__section-title">Channels</span>
      </button>
      <button class="btn btn-icon btn-sm" type="button" aria-label="Channel hinzufügen" (click)="openDialog()">
        <img src="/icons/add.svg" alt="" aria-hidden="true" />
      </button>
    </div>

    <div class="workspace__collapsible" [class.workspace__collapsible--open]="channelsOpen()">
      <ul class="workspace__list" id="workspace-channels">
        @for (channel of channels(); track channel.id) {
          <li>
            <a
              class="workspace__item"
              [routerLink]="['/app/channel', channel.id]"
              routerLinkActive="workspace__item--active"
            >
              <img class="workspace__item-icon" src="/icons/tag.svg" alt="" aria-hidden="true" />
              {{ channel.name }}
            </a>
          </li>
        }
        <li>
          <button class="workspace__item" type="button" (click)="openDialog()">
            <img class="workspace__item-icon" src="/icons/add-circle.svg" alt="" aria-hidden="true" />
            Channel hinzufügen
          </button>
        </li>
      </ul>
    </div>
  </section>

  <section class="workspace__section">
    <div class="workspace__section-head">
      <button
        class="workspace__section-toggle"
        type="button"
        aria-controls="workspace-direct"
        [attr.aria-expanded]="directOpen()"
        (click)="toggleDirect()"
      >
        <img
          class="workspace__caret"
          [class.workspace__caret--closed]="!directOpen()"
          src="/icons/arrow-drop-down.svg"
          alt=""
          aria-hidden="true"
        />
        <img
          class="workspace__section-icon"
          src="/icons/account-circle.svg"
          alt=""
          aria-hidden="true"
        />
        <span class="workspace__section-title">Direktnachrichten</span>
      </button>
    </div>

    <div class="workspace__collapsible" [class.workspace__collapsible--open]="directOpen()">
      <ul class="workspace__list" id="workspace-direct">
        @if (self(); as selfEntry) {
          <li>
            <a
              class="workspace__item"
              [routerLink]="['/app/dm', selfEntry.uid]"
              routerLinkActive="workspace__item--active"
            >
              <span class="workspace__avatar-wrap">
                <img class="workspace__avatar" [src]="selfEntry.avatar" alt="" aria-hidden="true" />
                <span class="workspace__status" aria-hidden="true"></span>
              </span>
              {{ selfEntry.name }}
            </a>
          </li>
        }
        @for (user of others(); track user.uid) {
          <li>
            <a
              class="workspace__item"
              [routerLink]="['/app/dm', user.uid]"
              routerLinkActive="workspace__item--active"
            >
              <span class="workspace__avatar-wrap">
                <img class="workspace__avatar" [src]="avatarSrc(user.avatarPath)" alt="" aria-hidden="true" />
                <span class="workspace__status workspace__status--offline" aria-hidden="true"></span>
              </span>
              {{ user.name }}
            </a>
          </li>
        }
      </ul>
    </div>
  </section>
</nav>

@if (dialogOpen()) {
  <app-channel-create-dialog (closed)="closeDialog()" />
}
