<div class="composer">
  <label class="sr-only" [for]="inputId">{{ placeholder() }}</label>
  <textarea
    #textarea
    [id]="inputId"
    class="composer__text"
    rows="1"
    [placeholder]="placeholder()"
    [value]="text()"
    (input)="onInput($event)"
    (keydown.enter)="onEnter($event)"
  ></textarea>

  <div class="composer__toolbar">
    <div class="composer__tools">
      <span class="composer__picker-wrap">
        <button
          class="composer__tool"
          type="button"
          aria-label="Emoji einfügen"
          [attr.aria-expanded]="pickerOpen()"
          (click)="pickerOpen.set(!pickerOpen()); $event.stopPropagation()"
        >
          <img src="/icons/smile.svg" alt="" aria-hidden="true" />
        </button>
        @if (pickerOpen()) {
          <app-emoji-picker
            class="composer__picker"
            (picked)="insertEmoji($event)"
            (closed)="pickerOpen.set(false)"
          />
        }
      </span>
      <button class="composer__tool" type="button" aria-label="Person erwähnen">
        <img src="/icons/at.svg" alt="" aria-hidden="true" />
      </button>
    </div>
    <button
      class="composer__send"
      type="button"
      aria-label="Nachricht senden"
      [disabled]="!canSend()"
      (click)="submit()"
    >
      <img src="/icons/send.svg" alt="" aria-hidden="true" />
    </button>
  </div>
</div>
