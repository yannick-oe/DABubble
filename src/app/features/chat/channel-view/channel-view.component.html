<section class="channel">
  <header class="channel__head">
    <button class="channel__title" type="button" aria-label="Channel-Details öffnen">
      <img class="channel__title-icon" src="/icons/tag.svg" alt="" aria-hidden="true" />
      <span class="channel__name">{{ channel()?.name }}</span>
      <img class="channel__caret" src="/icons/arrow-drop-down.svg" alt="" aria-hidden="true" />
    </button>

    <div class="channel__members">
      <button class="channel__members-list" type="button" aria-label="Mitglieder anzeigen">
        @for (member of headMembers(); track member.uid) {
          <img
            class="channel__member-avatar"
            [src]="avatarSrc(member.avatarPath)"
            alt=""
            aria-hidden="true"
          />
        }
        <span class="channel__member-count">{{ memberCount() }}</span>
      </button>
      <button class="channel__add-member" type="button" aria-label="Mitglieder hinzufügen">
        <img src="/icons/add-person.svg" alt="" aria-hidden="true" />
      </button>
    </div>
  </header>

  <div class="channel__list">
    <app-message-list
      [messages]="messages()"
      [resetKey]="channelId()"
      [openThreadId]="openThreadMessageId()"
      [collectionPath]="messagesCollectionPath()"
      (threadRequested)="toggleThread($event)"
    />
  </div>

  <div class="channel__composer">
    <app-message-input [placeholder]="composerPlaceholder()" (send)="sendMessage($event)" />
  </div>
</section>
